<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RECRUZEN-USA - AI Talent Sourcing for US IT</title>
<style>
* {box-sizing: border-box; margin:0; padding:0;}
body {font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:#f8fafc; color:#1e293b;}
.container {max-width:1200px; margin:0 auto; padding:0 24px;}
.hidden {display:none!important;}
.topbar {background:white; border-bottom:1px solid #e2e8f0; padding:14px 0; font-size:14px; position:sticky; top:0; z-index:20;}
.topbar.container {display:flex; justify-content:space-between; align-items:center;}
.topbar-logo {font-size:18px; font-weight:700; background: linear-gradient(90deg, #0B3D91, #F97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
.login-page {min-height:calc(100vh - 60px); display:flex; align-items:center; justify-content:center; padding:40px 20px; background:white;}
.login-box {width:400px; background:white; padding:40px; border-radius:8px; border:1px solid #e2e8f0;}
.btn {background:linear-gradient(90deg, #0B3D91, #1d4ed8); width:100%; padding:12px; border:none; border-radius:6px; color:white; font-weight:600; font-size:15px; cursor:pointer;}
.header {display:flex; justify-content:space-between; align-items:center; background:white; padding:16px 0; border-bottom:1px solid #e2e8f0; position:sticky; top:59px;}
.credits-badge {color:#F97316; font-weight:800;}
.profile-btn {background:#f1f5f9; border:1px solid #e2e8f0; padding:8px 12px; border-radius:8px; cursor:pointer; font-weight:600; display:flex; align-items:center; gap:8px;}
.profile-avatar {width:24px; height:24px; border-radius:50%; background:linear-gradient(90deg, #0B3D91, #F97316); color:white; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700;}
.dropdown {display:none; position:absolute; right:0; top:45px; background:white; min-width:180px; box-shadow:0 8px 24px rgba(0,0,0,0.12); border-radius:8px; z-index:100; border:1px solid #e2e8f0;}
.dropdown a {color:#334155; padding:12px 16px; text-decoration:none; display:block; font-size:14px;}
.show {display:block;}
.banner {background: linear-gradient(90deg, #F97316 0%, #0B3D91 100%); color:white; padding:24px 30px; border-radius:12px; margin:24px 0;}
.btn-primary {background:white; color:#0B3D91; padding:10px 18px; border:none; border-radius:6px; font-weight:700; cursor:pointer;}
.search-bar {background:white; padding:20px; border-radius:8px; border:1px solid #e2e8f0; display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; margin-bottom:20px;}
.search-bar input,.search-bar select {padding:12px; border:1px solid #cbd5e1; border-radius:6px; font-size:14px;}
.search-bar.full-width {grid-column: 1 / -1;}
.candidate-card {background:white; padding:20px; border-radius:8px; border:1px solid #e2e8f0; margin-bottom:16px;}
.candidate-card.mine {border:2px solid #F97316; background:#fff7ed;}
.tag {background:#eff6ff; color:#1e40af; padding:4px 8px; border-radius:4px; font-size:12px; margin-right:6px; display:inline-block;}
.match-badge {background:#dcfce7; color:#166534; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:700;}
.my-badge {background:#F97316; color:white; padding:3px 8px; border-radius:4px; font-size:12px; font-weight:700; margin-left:6px;}
.empty-state {text-align:center; padding:60px 20px; color:#64748b; background:white; border-radius:8px; border:1px dashed #cbd5e1;}
/* PDF POPUP */
.modal {display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.6);}
.modal-content {background:white; margin:3% auto; padding:0; border-radius:8px; width:90%; max-width:900px; height:90%;}
.modal-header {padding:16px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; align-items:center;}
.close {color:#aaa; font-size:28px; font-weight:bold; cursor:pointer;}
.close:hover {color:black;}
.modal-body {height:calc(100% - 60px);}
.modal-body iframe {width:100%; height:100%; border:none;}
</style>
</head>
<body>

<div class="topbar"><div class="container"><div class="topbar-logo">RECRUZEN-USA</div></div></div>

<div id="loginPage">
  <div class="login-page">
    <div class="login-box">
      <div style="font-size:28px; font-weight:700; background: linear-gradient(90deg, #0B3D91, #F97316); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">RECRUZEN-USA</div>
      <p>Sign in to your employer account</p>
      <label>Work Email</label><input type="email" id="email" placeholder="demo@staffing.com">
      <label>Password</label><input type="password" id="pass" placeholder="demo123">
      <button class="btn" onclick="login()">Sign In</button>
      <p style="background:#eff6ff; padding:12px; margin-top:20px; border-radius:6px;"><b>Demo:</b> demo@staffing.com / demo123</p>
    </div>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="container">
    <div class="header">
      <h2>Dashboard</h2>
      <div style="display:flex; align-items:center; gap:16px;">
        <div>Credits: <span id="credits" class="credits-badge">50</span></div>
        <div style="position:relative;">
          <div class="profile-btn" onclick="toggleProfile()"><div class="profile-avatar">RM</div><span>Ram Makina</span><span>▼</span></div>
          <div id="profileDropdown" class="dropdown"><a href="#">👤 My Profile</a><a href="#" onclick="logout()">🚪 Log out</a></div>
        </div>
      </div>
    </div>

    <div class="banner"><h1>🚀 AI Talent Radar</h1><p id="bannerText">Ready to find your next hire</p></div>

    <div class="search-bar">
      <div><label>Job Title</label><input type="text" id="jobTitle" placeholder="IT Support"></div>
      <div><label>Skills</label><input type="text" id="skills" placeholder="Java, ATS"></div>
      <div><label>Location</label><select id="location"><option value="">All Locations</option><option value="Austin, TX">Austin, TX</option><option value="Dallas, TX">Dallas, TX</option><option value="Remote">Remote</option></select></div>
      <div><label>Notice Period</label><select id="notice"><option value="">Any Notice</option><option value="Immediate">Immediate</option><option value="15 Days">15 Days</option><option value="30 Days">30 Days</option></select></div>
      <div><label>Visa Status</label><select id="visa"><option value="">All Visas</option><option value="H1B">H1B</option><option value="L2">L2 EAD</option><option value="OPT">OPT</option><option value="GC">Green Card</option></select></div>
      <div class="full-width"><button class="btn" onclick="searchCandidates()">🔍 AI Search Candidates</button></div>
    </div>

    <div id="candidateList"><div class="empty-state"><h3>Start your AI Search</h3><p>Enter filters and click "AI Search Candidates"</p></div></div>
  </div>
</div>

<!-- PDF MODAL -->
<div id="resumeModal" class="modal">
  <div class="modal-content">
    <div class="modal-header"><h3 id="modalTitle">Resume</h3><span class="close" onclick="closeModal()">&times;</span></div>
    <div class="modal-body"><iframe id="resumeFrame" src=""></iframe></div>
  </div>
</div>

<script>
let credits = parseInt(localStorage.getItem('recruzenCredits')) || 50;
let MY_RESUME_ID = "ganesh001";

let allCandidates = [
  {id:"ganesh001", name:"GANESH RAM MAKINA", role:"IT Support Specialist & Senior Recruiter", exp:9, visa:"H1B", loc:"Austin, TX", skills:["Java","J2EE","Spring Boot","ATS","AI Sourcing","JIRA","Kibana"], match:100, salary:"$95K", availability:"30 Days", resume:"1000388404.pdf"}, // NEE PDF
  {id:"priya002", name:"PRIYA SHARMA", role:"Senior Java Developer", exp:7, visa:"GC", loc:"Remote", skills:["Java","Microservices","AWS","Docker"], match:97, salary:"$140K", availability:"Immediate", resume:""},
  {id:"rahul003", name:"RAHUL MEHTA", role:"DevOps Engineer", exp:6, visa:"L2", loc:"Dallas, TX", skills:["Kubernetes","Jenkins","AWS","Terraform"], match:96, salary:"$130K", availability:"15 Days", resume:""}
];

(function init(){
  if(localStorage.getItem('recruzenSession') === 'loggedIn'){
    document.getElementById('dashboard').classList.remove('hidden');
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('credits').innerText = credits;
  }
})();

function login(){
  if(document.getElementById('email').value === "demo@staffing.com" && document.getElementById('pass').value === "demo123"){
    localStorage.setItem('recruzenSession', 'loggedIn');
    location.reload();
  } else { alert("Invalid. Use demo login."); }
}
function logout(){ localStorage.removeItem('recruzenSession'); location.reload(); }
function toggleProfile() { document.getElementById("profileDropdown").classList.toggle("show"); }

function searchCandidates(){
  let j=document.getElementById('jobTitle').value.toLowerCase();
  let s=document.getElementById('skills').value.toLowerCase();
  let l=document.getElementById('location').value;
  let n=document.getElementById('notice').value;
  let v=document.getElementById('visa').value;

  document.getElementById('bannerText').innerText = "AI is scanning 2.4M profiles...";
  document.getElementById('candidateList').innerHTML = "<p style='text-align:center; padding:40px;'>🤖 AI is ranking candidates...</p>";

  setTimeout(() => {
    let filtered = allCandidates.filter(c => {
      if(j==="" && s==="" && l==="" && n==="" && v===""){ return c.id === MY_RESUME_ID; }
      let matchJob = j==="" || c.role.toLowerCase().includes(j);
      let matchSkill = s==="" || c.skills.join(',').toLowerCase().includes(s);
      let matchLoc = l==="" || c.loc === l;
      let matchVisa = v==="" || c.visa === v;
      let matchNotice = n==="" || c.availability === n;
      return matchJob && matchSkill && matchLoc && matchVisa && matchNotice;
    });

    filtered.forEach(c => { if(c.id === MY_RESUME_ID) c.match = 100; });
    filtered.sort((a,b) => b.match - a.match);
    renderCandidates(filtered, `${filtered.length} AI Ranked Candidates`);
    document.getElementById('bannerText').innerText = `AI found ${filtered.length} candidates in 0.8 seconds`;
  }, 800);
}

function renderCandidates(list, title){
  if(list.length === 0) { document.getElementById('candidateList').innerHTML = `<div class="empty-state"><h3>No candidates found</h3></div>`; return; }
  let html = `<h3 style="margin-bottom:16px;">${title}</h3>`;
  list.forEach(c=>{
    let isMe = c.id === MY_RESUME_ID;
    html+=`<div class="candidate-card ${isMe? 'mine' : ''}">
      <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
        <div>
          <h3>${c.name} <span class="match-badge">${c.match}% Match</span> ${isMe? '<span class="my-badge">YOUR PROFILE</span>' : ''}</h3>
          <p>${c.role} | ${c.exp} Years | ${c.loc}</p>
          <div style="margin:8px 0;">${c.skills.map(skill=>`<span class="tag">${skill}</span>`).join('')}</div>
          <p style="font-size:13px;">Visa: ${c.visa} | Salary: ${c.salary} | Available: ${c.availability}</p>
        </div>
        <button class="btn" style="width:auto; padding:10px 20px;" onclick="viewResume('${c.id}', '${c.name}', '${c.resume}')">View Resume</button>
      </div>
    </div>`;
  });
  document.getElementById('candidateList').innerHTML = html;
}

function viewResume(id, name, resumeFile){
  if(credits <= 0) { alert("No credits left. Please upgrade."); return; }
  credits--;
  localStorage.setItem('recruzenCredits', credits);
  document.getElementById('credits').innerText = credits;
  
  document.getElementById('modalTitle').innerText = name + " - Resume";
  document.getElementById('resumeFrame').src = resumeFile;
  document.getElementById('resumeModal').style.display = "block";
}
function closeModal(){ document.getElementById('resumeModal').style.display = "none"; }
window.onclick = function(event) { if (event.target == document.getElementById('resumeModal')) { closeModal(); } }
</script>
</body>
</html>
