<!DOCTYPE html>
<html>
<head>
<title>RECRUZEN-USA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{font-family:Arial; background:#f0f2f5; margin:0;}
.login{height:100vh; display:flex; align-items:center; justify-content:center; background:#0B3D91;}
.box{background:white; padding:30px; border-radius:10px; width:90%; max-width:400px;}
.box h1{text-align:center; color:#0B3D91;}
.box input{width:100%; padding:12px; margin:10px 0; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;}
.btn{width:100%; padding:12px; background:#F97316; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;}
.hidden{display:none;}
.header{background:white; padding:15px; display:flex; justify-content:space-between; border-bottom:1px solid #ddd;}
.card{background:white; margin:15px; padding:15px; border-radius:8px; border:2px solid #F97316;}
</style>
</head>
<body>

<div id="login">
<div class="login">
<div class="box">
<h1>RECRUZEN-USA</h1>
<input type="email" id="email" placeholder="Email" value="demo@staffing.com">
<input type="password" id="pass" placeholder="Password" value="demo123">
<button class="btn" onclick="login()">Login</button>
<p style="text-align:center; font-size:12px; margin-top:15px;">Demo: demo@staffing.com / demo123</p>
</div>
</div>
</div>

<div id="dash" class="hidden">
<div class="header">
<h2>Dashboard</h2>
<div>Credits: <b id="credit">50</b></div>
</div>

<div style="padding:15px;">
<button class="btn" onclick="search()">Search Candidates</button>
<div id="list"></div>
</div>
</div>

<script>
let credits = 50;

function login(){
  let e = document.getElementById('email').value;
  let p = document.getElementById('pass').value;
  if(e=='demo@staffing.com' && p=='demo123'){
    document.getElementById('login').classList.add('hidden');
    document.getElementById('dash').classList.remove('hidden');
  }else{
    alert('Wrong password');
  }
}

function search(){
  document.getElementById('list').innerHTML = `
  <div class="card">
    <h3>GANESH RAM MAKINA <span style="color:green;">100% Match</span></h3>
    <p>IT Support Specialist | 9 Years | Austin, TX</p>
    <p>Skills: Java, ATS, AI Sourcing</p>
    <button class="btn" onclick="download()">Download Resume</button>
  </div>`;
}

function download(){
  if(credits<=0){alert('No credits'); return;}
  credits--;
  document.getElementById('credit').innerText = credits;
  let txt = "Name: GANESH RAM MAKINA\nEmail: ganesh.ram.makina@gmail.com\nRole: IT Support";
  let a = document.createElement('a');
  a.href = 'data:text/plain,' + encodeURIComponent(txt);
  a.download = 'Resume.txt';
  a.click();
  alert('Downloaded! Credits left: ' + credits);
}
</script>

</body>
</html>
